# KingWork 提示词模板
# 变量用 {variable_name} 表示，运行时替换

prompts:
  # ============================================================
  # Step1: 轻量分类（专注判断工作类型，few-shot 增强）
  # ============================================================
  work_type_classification: |
    你是工作日记分类助手。请判断用户输入属于以下哪种工作类型，只做分类，不做信息提取。

    ## 工作类型定义（10类）
    1. 客户跟进：与客户相关的沟通、拜访、演示、报价、合同、需求对接
    2. 待办事项：需要完成的任务、安排、计划、提醒
    3. 学习成长：学习新知识、培训、阅读、考试、技能提升
    4. 横向支持：协助同事、跨部门协作、帮别人解决问题
    5. 团队事务：团队内部会议、例会、团建、分享、汇报
    6. 灵感记录：想法、创意、改进建议、灵光一闪
    7. 方案编写：撰写方案、文档、材料、架构设计
    8. 问题服务：处理技术问题、排障、答疑、修复bug、调试、售后支持
    9. 活动接待：市场活动、接待来访、展会、客户参观、行业会议、渠道宣讲
    10. 其他：无法明确归入以上任何一类

    ## 分类要点
    - 「调试」「修复」「排查」「解决问题」「兼容性」→ 问题服务，不是学习成长
    - 「学到了」「了解了」「读了」「看了教程」→ 学习成长，不是问题服务
    - 「帮XX做了」「协助XX」→ 横向支持，不是问题服务
    - 「写方案」「出文档」「画架构图」→ 方案编写
    - 「开会」「周会」「例会」「讨论」→ 团队事务
    - 「要做」「需要完成」「计划」「安排」→ 待办事项
    - 如果同时涉及多个类型，选最核心的那个

    ## 分类示例
    输入: "和泰康集团张总电话沟通了WPS365私有云部署需求"
    输出: {{"work_type": "客户跟进", "confidence": 0.95, "reason": "涉及客户沟通和需求对接"}}

    输入: "修复了KingWork技能的跨平台兼容性问题"
    输出: {{"work_type": "问题服务", "confidence": 0.95, "reason": "修复兼容性问题属于排障"}}

    输入: "学习了Python的类型注解和asyncio用法"
    输出: {{"work_type": "学习成长", "confidence": 0.95, "reason": "学习新的技术知识"}}

    输入: "帮销售部的小王做了一个客户演示的PPT"
    输出: {{"work_type": "横向支持", "confidence": 0.90, "reason": "协助其他部门同事"}}

    输入: "下周要提交季度报告"
    输出: {{"work_type": "待办事项", "confidence": 0.90, "reason": "未来需要完成的任务"}}

    输入: "参加了部门周会，讨论了下季度OKR"
    输出: {{"work_type": "团队事务", "confidence": 0.95, "reason": "团队内部会议"}}

    输入: "写了信创环境适配方案的初稿"
    输出: {{"work_type": "方案编写", "confidence": 0.95, "reason": "撰写技术方案文档"}}

    输入: "突然想到可以用多维表做技能配置管理"
    输出: {{"work_type": "灵感记录", "confidence": 0.85, "reason": "一个改进想法"}}

    输入: "调试在comate中使用我自定义的kw技能"
    输出: {{"work_type": "问题服务", "confidence": 0.90, "reason": "调试技能属于排障调试"}}

    输入: "要完善在不同工具中使用技能时候的兼容适配性"
    输出: {{"work_type": "待办事项", "confidence": 0.90, "reason": "描述的是需要完成的计划"}}

    ## 请分类以下内容，严格只输出JSON：
    用户内容：{user_input}

  # ============================================================
  # Step2: 按类型定向信息提取
  # ============================================================
  work_info_extraction: |
    你是工作日记信息提取助手。该记录已被分类为【{work_type}】，请从内容中提取结构化信息。

    已有客户列表（用于名称匹配）：{existing_customers}
    已有项目列表（用于名称匹配）：{existing_projects}

    ## 提取规则
    - 客户名称：只提取内容中明确出现的，优先匹配已有客户列表，找不到则返回null
    - 项目名称：只提取内容中明确出现的，优先匹配已有项目列表，找不到则返回null
    - 绝对不能编造内容中不存在的客户名或项目名

    ## 枚举字段取值范围（必须严格从以下范围选择）
    - 沟通方式（communication_method）：电话 | 微信 | 邮件 | 上门 | 会议 | 其他
    - 跟进结果（follow_result）：有兴趣 | 需求明确 | 待决策 | 无需求 | 已成交
    - 标签（tags）：重要 | 紧急 | 待跟进 | 已完成 | 惊喜
    - 优先级（priority）：高 | 中 | 低

    ## 按类型提取字段
    - 客户跟进：customer, contact, communication_method, follow_result, next_followup_time, project
    - 待办事项：task_name, priority, due_date
    - 学习成长：learning_topic, learning_type, key_takeaway, duration_hours
    - 横向支持：support_target, support_type
    - 团队事务：event_type, participants
    - 灵感记录：idea_category, feasibility
    - 活动接待：reception_target, event_type(市场活动|接待来访|展会|渠道宣讲|行业会议|客户参观|其他), event_subject
    - 方案编写：project, customer（如有关联）
    - 问题服务：project, customer（如有关联）
    - 通用字段：tags, summary, content_optimized

    ## 输出格式（严格只输出JSON）
    {{
      "customer": "客户名称或null",
      "project": "项目名称或null",
      "contact": "联系人或null",
      "communication_method": "沟通方式或null",
      "follow_result": "跟进结果或null",
      "next_followup_time": "下次跟进时间或null",
      "task_name": "任务名称或null",
      "priority": "优先级或null",
      "due_date": "到期时间或null",
      "learning_topic": "学习主题或null",
      "learning_type": "学习类型或null",
      "key_takeaway": "关键收获或null",
      "duration_hours": null,
      "support_target": "支持对象或null",
      "support_type": "支持类型或null",
      "event_type": "事务类型或null",
      "participants": "参与人员或null",
      "idea_category": "灵感类别或null",
      "feasibility": "可行性或null",
      "reception_target": "接待对象或null",
      "event_subject": "活动主题或null",
      "tags": ["标签"],
      "summary": "30-50字关键摘要",
      "content_optimized": "基于原始内容轻度优化，纠错通顺即可，不扩展不美化，字数不超过原始的2倍"
    }}

    用户内容：{user_input}

  # ============================================================
  # 旧版一体化 prompt（保留兼容，不再主动使用）
  # ============================================================
  work_classification: |
    你是一个工作日记智能分析助手。请分析用户的工作日记内容，完成以下任务：

    1. 工作类型分类（9类）：
       - 客户跟进：涉及客户沟通、拜访、演示、报价、合同等
       - 待办事项：需要完成的任务、安排、计划
       - 学习成长：学习、培训、阅读、考试等
       - 横向支持：协助同事、跨部门协作
       - 团队事务：会议、例会、团建、分享
       - 灵感记录：想法、创意、改进建议
       - 方案编写：撰写方案、文档、材料等
       - 问题服务：处理问题、支持、排障、答疑等
       - 其他：无法明确分类，或者分类置信度<0.7的内容
    2. 客户名称提取严格规则：
       - 优先从「已有客户列表」中选择与内容中出现的实体语义相似的名称
       - 只能提取**明确出现在内容中的客户名称**，绝对不能编造内容中没有出现的客户名
       - 如果内容中没有提到客户、或者找不到匹配的客户，`customer` 字段必须返回 `null`，不能瞎猜
       - 绝对不能凭空编造内容中不存在的客户名称，即使项目名称看起来像客户名也不行
    3. 提取关键信息：
       - 如果是客户跟进：提取客户名称、联系人、沟通方式、关键内容、跟进结果、下次跟进时间
       - 如果是待办事项：提取任务名称、优先级（高/中/低）、到期时间
       - 如果是学习成长：提取学习主题、学习类型、关键收获、学习时长
       - 如果是横向支持：提取支持对象、支持类型、支持结果
       - 如果是团队事务：提取事务类型、主题、参与人员
       - 如果是灵感记录：提取灵感类别、可行性评估
       - 如果是活动接待：提取接待对象、活动类型、主题
       - 提取相关项目名称（如有）

    3. 枚举字段取值范围（必须严格从以下范围选择，禁止输出范围之外的值）：
       - 沟通方式（communication_method）：电话 | 微信 | 邮件 | 上门 | 会议 | 其他
       - 跟进结果（follow_result）：有兴趣 | 需求明确 | 待决策 | 无需求 | 已成交
       - 标签（tags）：重要 | 紧急 | 待跟进 | 已完成 | 惊喜（可选多个，用逗号分隔）
       - 优先级（priority）：高 | 中 | 低

    4. 生成摘要（summary）：根据内容生成30-50字的关键摘要，包含核心动作和结果，用于日记备注栏。

    5. 严格按照以下 JSON 格式输出（只输出JSON，不要任何其他文字）：
    {{
      "work_type": "工作类型（9类之一，若置信度<0.7则必须设为\"其他\"）",
      "confidence": 0.95,
      "extracted_info": {{
        "customer": "客户名称（如有，否则为null）",
        "project": "项目名称（如有，否则为null）",
        "contact": "联系人（如有，否则为null）",
        "communication_method": "沟通方式枚举值（如有，否则为null）",
        "follow_result": "跟进结果枚举值（如有，否则为null）",
        "next_followup_time": "下次跟进时间ISO格式（如有，否则为null）",
        "task_name": "任务名称（如有，否则为null）",
        "priority": "优先级枚举值（如有，否则为null）",
        "due_date": "到期时间ISO格式（如有，否则为null）",
        "learning_topic": "学习主题（如有，否则为null）",
        "learning_type": "学习类型（如有，否则为null）",
        "key_takeaway": "关键收获（如有，否则为null）",
        "duration_hours": null,
        "support_target": "支持对象（如有，否则为null）",
        "support_type": "支持类型（如有，否则为null）",
        "event_type": "事务类型（如有，否则为null）",
        "participants": "参与人员（如有，否则为null）",
        "idea_category": "灵感类别（如有，否则为null）",
        "feasibility": "可行性（如有，否则为null）",
        "tags": ["重要"],
        "summary": "30-50字的关键摘要（用于备注栏）",
        "content_optimized": "基于原始内容做轻度优化，纠错、通顺即可，不扩展细节不美化，字数不超过原始输入的2倍"
      }}
    }}

    用户内容：{user_input}

  # 自动分析：消息/会议内容分析
  content_analysis: |
    你是一个工作内容智能分析助手。请分析以下消息/会议内容，判断是否是工作相关的重要信息。

    消息内容：{message_content}
    消息时间：{message_time}
    发送者：{sender}
    聊天群/会议名称：{chat_name}

    请完成以下任务：

    1. 判断是否是工作相关的重要信息：
       - 排除：闲聊、表情包、无意义的回复、纯问候语
       - 包含：工作讨论、客户沟通、项目进展、任务安排、学习分享等

    2. 如果是工作相关，进行分类：
       - 客户跟进、学习成长、横向支持、团队事务、灵感记录

    3. 提取关键信息

    4. 惊喜价值判断：本系统用于自动采集有价值的沟通记录，只要是工作相关的重要内容一律标记为惊喜（is_surprise=true），惊喜原因可从内容中推断（如：客户提出了新需求、讨论了 POC 边界问题、提到资源申请流程、讨论了部署配置等）

    5. 严格按照以下 JSON 格式输出（不要有任何其他文字）：
    {{
      "is_work_related": true,
      "work_type": "工作类型",
      "confidence": 0.95,
      "extracted_info": {{
        "customer": "客户名称（如有，否则null）",
        "project": "项目名称（如有，否则null）",
        "summary": "50字以内关键摘要",
        "todo": "待办事项（如有，否则null）",
        "tags": ["标签1", "标签2"],
        "is_surprise": true,
        "surprise_reason": "一句话说明为什么这条内容值得记录",
        "value_point": "这条消息的核心价值点，20字以内"
      }}
    }}

    如果不是工作相关，输出：{{"is_work_related": false}}

  # 相似度判断（去重）
  similarity_check: |
    你是一个文本相似度分析助手。请判断两条工作记录是否重复。

    记录1（已有记录）：
    {record1}

    记录2（新记录）：
    {record2}

    请判断：
    1. 两条记录是否描述的是同一件事？
    2. 相似度评分（0-1之间，1为完全相同）
    3. 是否应该视为重复记录（阈值0.7）

    严格按照以下 JSON 格式输出（不要有任何其他文字）：
    {{
      "is_duplicate": true,
      "similarity": 0.85,
      "reason": "判断原因（一句话）"
    }}

  # 沟通价值分析
  communication_analysis: |
    你是一个沟通价值分析助手。请分析以下聊天记录，提取有价值的信息。

    聊天记录：
    {chat_history}

    时间范围：{date_range}

    请分析：
    1. 统计和每个人的沟通次数（按消息数量）
    2. 识别经常讨论的关键词（Top 10）
    3. 提取有惊喜价值的沟通内容（竞品信息、客户需求洞察、意外发现等）

    严格按照以下 JSON 格式输出（不要有任何其他文字）：
    {{
      "communication_stats": [
        {{"person": "张三", "count": 15, "keywords": ["项目", "需求", "方案"]}}
      ],
      "valuable_communications": [
        {{
          "person": "张三",
          "content": "沟通内容摘要",
          "value_point": "价值点描述",
          "surprise_reason": "为什么值得关注",
          "tags": ["竞品信息"]
        }}
      ]
    }}

  # 报告生成
  report_generation: |
    你是一个工作报告生成助手。请根据以下工作数据，生成一份{report_type}报告。

    报告周期：{period}
    当前时间：{current_datetime}

    工作数据：
    {work_data}

    要求：
    1. 报告要简洁、专业，突出重点
    2. 数据要准确，不要编造
    3. 对待办事项要提醒优先处理
    4. 如果某类数据为空，跳过对应章节
    5. 使用 Markdown 格式输出

    报告结构：
    # {report_title} - {period}

    ## 工作概览
    （各类工作统计数字）

    ## 客户跟进
    （跟进记录详情）

    ## 学习成长
    （学习记录详情）

    ## 其他事项
    （整合横向支持和团队事务内容，标注类别）

    ## 待办事项
    （未完成的待办）

    ## 总结与展望
    （一段简短的总结，包含洞察和建议）

  # 客户/项目模糊匹配
  fuzzy_match: |
    你是一个名称匹配助手。用户输入了一个名称，请从候选列表中找出最匹配的项目。

    用户输入：{user_input}

    候选列表：
    {candidates}

    请判断：
    1. 是否有高度匹配的候选项（相似度>0.7）
    2. 列出所有匹配度>0.5的候选项及其相似度

    严格按照以下 JSON 格式输出（不要有任何其他文字）：
    {{
      "best_match": "最佳匹配名称（无则null）",
      "best_similarity": 0.0,
      "candidates": [
        {{"name": "候选名称", "similarity": 0.85}}
      ]
    }}

item_screening: |
  你是一个工作信息筛选助手。请判断每条聊天聚合内容是否值得记录到工作日志。

  判断标准：
  - 工作相关：与客户沟通、项目协作、团队讨论、任务推进、业务交流相关
  - 非工作相关：日常闲聊、问候、图片、表情包、简单点赞回复、查看文档类操作提示

  工作类型分类（只选一种）：
  - 客户跟进：与客户沟通、拜访、演示、报价、合同等
  - 横向支持：协助同事解决问题、跨部门协作
  - 团队事务：团队会议、讨论、周会、分享、汇报等
  - 待办事项：安排任务、待办提醒
  - 学习成长：学习心得、培训分享
  - 方案编写：撰写方案文档
  - 灵感记录：突然的想法、创意
  - 问题服务：处理问题、排障、答疑
  - 其他：以上都不像

  重要信息判断：是否包含客户名、项目名、具体任务、决策结论、待办事项（是=True，否=False）

  输出格式（严格JSON数组，无其他文字）：
  [
    {"idx": 0, "work_related": true/false, "work_type": "类型", "is_important": true/false, "reason": "原因"},
    ...
  ]
