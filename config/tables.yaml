tables:
- key: diary_records
  name: 01日记记录
  description: 主入口表，记录所有工作日记
  fields:
  - name: 记录时间
    field_type: Date
  - name: 内容
    field_type: MultiLineText
  - name: 工作类型
    field_type: SingleSelect
    options:
    - 客户跟进
    - 待办事项
    - 学习成长
    - 横向支持
    - 团队事务
    - 灵感记录
    - 方案编写
    - 问题服务
    - 活动接待
    - 其他
  - name: 关联客户
    field_type: SingleLineText
  - name: 关联项目
    field_type: SingleLineText
  - name: 标签
    field_type: MultiSelect
    options:
    - 重要
    - 紧急
    - 待跟进
    - 已完成
    - 惊喜
  - name: 创建时间
    field_type: Date
  - name: 来源
    field_type: SingleSelect
    options:
    - 手动输入
    - AI自动分析
  - name: 备注
    field_type: MultiLineText
  views:
  - name: 全部日记
    view_type: Grid
  - name: 今日日记
    view_type: Grid
  - name: 本周日记
    view_type: Grid
- key: todo_records
  name: 02待办记录
  description: 待办事项管理
  fields:
  - name: 任务名称
    field_type: SingleLineText
  - name: 任务描述
    field_type: MultiLineText
  - name: 优先级
    field_type: SingleSelect
    options:
    - 高
    - 中
    - 低
  - name: 状态
    field_type: SingleSelect
    options:
    - 待处理
    - 进行中
    - 已完成
    - 已取消
  - name: 到期时间
    field_type: Date
  - name: 关联客户
    field_type: SingleLineText
  - name: 关联项目
    field_type: SingleLineText
  - name: 创建时间
    field_type: Date
  - name: 完成时间
    field_type: Date
  - name: 备注
    field_type: MultiLineText
  views:
  - name: 全部待办
    view_type: Grid
  - name: 待办任务
    view_type: Grid
  - name: 今日到期
    view_type: Grid
- key: customer_profiles
  name: 03客户档案
  description: 客户信息管理
  fields:
  - name: 客户名称
    field_type: SingleLineText
  - name: 客户类型
    field_type: SingleSelect
    options:
    - 潜在客户
    - 意向客户
    - 正式客户
    - 战略客户
    - 沉睡客户
  - name: 行业
    field_type: SingleSelect
    options:
    - 金融
    - 制造
    - 零售
    - 医疗
    - 教育
    - 政府
    - 互联网
    - 其他
  - name: 联系人
    field_type: SingleLineText
  - name: 联系方式
    field_type: SingleLineText
  - name: 客户状态
    field_type: SingleSelect
    options:
    - 跟进中
    - 暂缓
    - 成交
    - 流失
  - name: 最近跟进时间
    field_type: Date
  - name: 跟进次数
    field_type: Number
  - name: 创建时间
    field_type: Date
  - name: 备注
    field_type: MultiLineText
  views:
  - name: 全部客户
    view_type: Grid
  - name: 活跃客户
    view_type: Grid
- key: project_profiles
  name: 04项目档案
  description: 项目信息管理
  fields:
  - name: 项目名称
    field_type: SingleLineText
  - name: 项目状态
    field_type: SingleSelect
    options:
    - 售前
    - 立项
    - 进行中
    - 已完成
    - 暂停
    - 取消
  - name: 项目类型
    field_type: SingleSelect
    options:
    - 新项目
    - 续约
    - 增值
    - 试点
  - name: 关联客户
    field_type: SingleLineText
  - name: 开始时间
    field_type: Date
  - name: 预计结束时间
    field_type: Date
  - name: 实际结束时间
    field_type: Date
  - name: 项目优先级
    field_type: SingleSelect
    options:
    - 高
    - 中
    - 低
  - name: 创建时间
    field_type: Date
  - name: 备注
    field_type: MultiLineText
  views:
  - name: 全部项目
    view_type: Grid
  - name: 进行中项目
    view_type: Grid
- key: customer_followups
  name: 05客户跟进记录
  description: 客户跟进历史
  fields:
  - name: 跟进时间
    field_type: Date
  - name: 客户名称
    field_type: SingleLineText
  - name: 跟进方式
    field_type: SingleSelect
    options:
