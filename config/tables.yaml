    - 微信
    - 邮件
    - 上门
    - 会议
    - 其他
  - name: 跟进内容
    field_type: MultiLineText
  - name: 跟进结果
    field_type: SingleSelect
    options:
    - 有兴趣
    - 需求明确
    - 待决策
    - 无需求
    - 已成交
  - name: 下次跟进时间
    field_type: Date
  - name: 来源
    field_type: SingleSelect
    options:
    - 手动输入
    - AI自动分析
  - name: 关联日记ID
    field_type: SingleLineText
  - name: 会议链接
    field_type: SingleLineText
  - name: 创建时间
    field_type: Date
  views:
  - name: 全部跟进记录
    view_type: Grid
  - name: 待下次跟进
    view_type: Grid
- key: learning_records
